<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Voidwalker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; width: 280px; padding: 14px; background: #fff; color: #111; }
    h1 { font-size: 15px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.3px; }
    .status-row { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    .status-label { font-size: 13px; font-weight: 500; }
    .metrics { font-size: 11px; color: #6b7280; margin-bottom: 12px; line-height: 1.7; }
    .divider { border: none; border-top: 1px solid #e5e7eb; margin-bottom: 12px; }
    label { font-size: 12px; font-weight: 500; display: block; margin-bottom: 4px; }
    .hint { font-size: 11px; color: #9ca3af; margin-bottom: 6px; }
    input[type="password"] {
      width: 100%; font-size: 12px; font-family: monospace;
      padding: 5px 7px; border: 1px solid #d1d5db; border-radius: 5px;
      outline: none; transition: border-color 0.15s;
    }
    input[type="password"]:focus { border-color: #3b82f6; }
    .btn-row { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
    button {
      font-size: 12px; padding: 5px 12px; border: none;
      background: #3b82f6; color: #fff; border-radius: 5px; cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #2563eb; }
    .saved { font-size: 11px; color: #22c55e; }
    .section-title { font-size: 12px; font-weight: 500; margin-bottom: 6px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .toggle-label { font-size: 12px; color: #374151; }
    .toggle { position: relative; display: inline-block; width: 32px; height: 18px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #d1d5db; border-radius: 18px; transition: 0.2s; }
    .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
    input:checked + .slider { background: #3b82f6; }
    input:checked + .slider:before { transform: translateX(14px); }
    .origins-list { list-style: none; margin: 4px 0 6px; max-height: 80px; overflow-y: auto; }
    .origins-list li { display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-family: monospace; padding: 2px 0; color: #374151; }
    .origins-list li span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
    .remove-btn { font-size: 10px; color: #ef4444; cursor: pointer; background: none; border: none; padding: 0 2px; flex-shrink: 0; }
    .origin-input-row { display: flex; gap: 5px; }
    .origin-input-row input { flex: 1; font-size: 11px; font-family: monospace; padding: 4px 6px; border: 1px solid #d1d5db; border-radius: 5px; outline: none; }
    .origin-input-row input:focus { border-color: #3b82f6; }
    .add-btn { font-size: 11px; padding: 4px 8px; white-space: nowrap; }
    .empty-hint { font-size: 11px; color: #9ca3af; font-style: italic; }
  </style>
</head>
<body>
  <h1>Voidwalker</h1>

  <div class="status-row">
    <div class="dot disconnected" id="statusDot"></div>
    <span class="status-label" id="statusLabel">Checking…</span>
  </div>
  <div class="metrics" id="metrics"></div>

  <hr class="divider" />

  <label for="tokenInput">Auth Token</label>
  <p class="hint">Copy from <code>~/.voidwalker/token</code></p>
  <input type="password" id="tokenInput" placeholder="paste token here" autocomplete="off" spellcheck="false" />
  <div class="btn-row">
    <button id="saveBtn">Save &amp; Reconnect</button>
    <span class="saved" id="savedMsg" style="display:none">Saved!</span>
  </div>

  <hr class="divider" />

  <div class="toggle-row">
    <span class="toggle-label">Confirm writes</span>
    <label class="toggle">
      <input type="checkbox" id="confirmWritesToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <hr class="divider" />

  <p class="section-title">Allowed origins</p>
  <p class="hint">Empty = allow all. Add origins to restrict access.</p>
  <ul class="origins-list" id="originsList"></ul>
  <div class="origin-input-row">
    <input type="text" id="originInput" placeholder="https://example.com" spellcheck="false" />
    <button class="add-btn" id="addOriginBtn">Add</button>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
